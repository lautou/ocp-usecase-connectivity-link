apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  instances: 1
  db:
    vendor: postgres
    host: postgres-db.keycloak.svc.cluster.local
    port: 5432
    database: postgres
    usernameSecret:
      name: postgres-db
      key: POSTGRES_USER
    passwordSecret:
      name: postgres-db
      key: POSTGRES_PASSWORD
  hostname:
    hostname: keycloak.placeholder
  http:
    httpEnabled: true
  ingress:
    enabled: true
  additionalOptions:
    - name: proxy-headers
      value: xforwarded

apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-hostname-setup
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: Force=true
spec:
  template:
    spec:
      serviceAccountName: openshift-gitops-argocd-application-controller
      restartPolicy: Never
      containers:
        - name: patch-keycloak-hostname
          image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e

              echo "Step 1/2: Extract cluster apps domain"
              BASE_DOMAIN=$(oc get dns cluster -o jsonpath='{.spec.baseDomain}')
              APPS_DOMAIN="apps.${BASE_DOMAIN}"
              echo "Apps domain: ${APPS_DOMAIN}"

              echo "Step 2/2: Patch Keycloak hostname"
              oc patch keycloak keycloak -n keycloak --type=json -p='[
                {"op": "replace", "path": "/spec/hostname/hostname", "value": "keycloak-keycloak.'${APPS_DOMAIN}'"}
              ]'

              echo "✅ Keycloak hostname patched successfully"

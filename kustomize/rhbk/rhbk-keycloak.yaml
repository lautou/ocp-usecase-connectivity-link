apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: rhbk
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: connectivity-link
spec:
  instances: 1
  db:
    vendor: postgres
    host: postgres-db.rhbk.svc.cluster.local
    port: 5432
    database: keycloak
    usernameSecret:
      name: postgres-db
      key: POSTGRES_USERNAME
    passwordSecret:
      name: keycloak-db-password
      key: password
  http:
    httpEnabled: true
  hostname:
    hostname: keycloak-rhbk.placeholder  # Will be patched to actual cluster domain
  ingress:
    enabled: true
  additionalOptions:
    - name: proxy-headers
      value: xforwarded  # Trust X-Forwarded-* headers from OpenShift Route

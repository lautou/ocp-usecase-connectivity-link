apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  namespace: rhbk
  labels:
    app.kubernetes.io/name: postgres-db
    app.kubernetes.io/part-of: connectivity-link
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-db
    spec:
      containers:
        - name: postgresql
          image: registry.redhat.io/rhel9/postgresql-15:latest
          env:
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-db
                  key: POSTGRES_USERNAME
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-db
                  key: POSTGRES_PASSWORD
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: postgres-db
                  key: POSTGRES_DATABASE
          ports:
            - containerPort: 5432
              protocol: TCP
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - mountPath: /var/lib/pgsql/data
              name: postgres-data
      volumes:
        - name: postgres-data
          emptyDir: {}

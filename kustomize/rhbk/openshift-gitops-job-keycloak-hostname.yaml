apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-hostname-setup
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: Force=true
  labels:
    app.kubernetes.io/name: keycloak-hostname-setup
    app.kubernetes.io/part-of: connectivity-link
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak-hostname-setup
    spec:
      serviceAccountName: openshift-gitops-argocd-application-controller
      restartPolicy: Never
      containers:
        - name: setup
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e

              echo "=========================================="
              echo "Keycloak Hostname Setup"
              echo "=========================================="
              echo ""

              # Get cluster apps domain
              echo "[1/2] Getting cluster apps domain..."
              APPS_DOMAIN=$(oc get ingresscontroller default -n openshift-ingress-operator -o jsonpath='{.status.domain}')
              KEYCLOAK_HOSTNAME="keycloak-rhbk.${APPS_DOMAIN}"

              echo "✓ Cluster apps domain: ${APPS_DOMAIN}"
              echo "✓ Target hostname: ${KEYCLOAK_HOSTNAME}"

              # Patch Keycloak CR hostname
              echo ""
              echo "[2/2] Patching Keycloak CR hostname..."

              oc patch keycloak keycloak -n rhbk --type=json -p="[
                {\"op\": \"replace\", \"path\": \"/spec/hostname/hostname\", \"value\": \"${KEYCLOAK_HOSTNAME}\"}
              ]"

              echo ""
              echo "=========================================="
              echo "✅ Keycloak hostname updated successfully!"
              echo "=========================================="
              echo ""
              echo "📋 Summary:"
              echo "  Keycloak CR: keycloak"
              echo "  Namespace: rhbk"
              echo "  Hostname: ${KEYCLOAK_HOSTNAME}"
              echo "  Note: Operator will recreate Route with new hostname"
              echo ""

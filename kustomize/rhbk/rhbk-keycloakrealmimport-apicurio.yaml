apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: apicurio
  namespace: rhbk
  labels:
    app.kubernetes.io/name: apicurio-realm
    app.kubernetes.io/part-of: connectivity-link
spec:
  keycloakCRName: keycloak
  realm:
    id: apicurio
    realm: apicurio
    enabled: true
    displayName: Apicurio Realm
    registrationAllowed: true
    registrationEmailAsUsername: true
    rememberMe: true
    verifyEmail: false
    loginWithEmailAllowed: true
    duplicateEmailsAllowed: false
    resetPasswordAllowed: true
    editUsernameAllowed: false
    bruteForceProtected: true
    sslRequired: external  # RHBK 26: external (not "none" - more secure)
    clients:
      - clientId: apicurio-api
        name: Apicurio API
        description: OAuth client for Apicurio API backend
        enabled: true
        clientAuthenticatorType: client-secret
        secret: apicurio-api-secret  # DEMO SECRET
        bearerOnly: true
        standardFlowEnabled: true
        directAccessGrantsEnabled: true
        serviceAccountsEnabled: false
        publicClient: false
        protocol: openid-connect
        attributes:
          access.token.lifespan: "1800"
        defaultClientScopes:
          - profile
          - email
          - roles
        optionalClientScopes:
          - address
          - phone
          - offline_access

      - clientId: apicurio-studio
        name: Apicurio Studio
        description: OAuth client for Apicurio Studio UI
        enabled: true
        publicClient: true
        standardFlowEnabled: true
        directAccessGrantsEnabled: true
        implicitFlowEnabled: false  # RHBK 26: Implicit Flow removed
        serviceAccountsEnabled: false
        protocol: openid-connect
        rootUrl: https://apicurio-studio-ui-apicurio.placeholder  # Placeholder
        redirectUris:
          - https://apicurio-studio-ui-apicurio.placeholder/*
        baseUrl: https://apicurio-studio-ui-apicurio.placeholder
        webOrigins:
          - https://apicurio-studio-ui-apicurio.placeholder
        attributes:
          pkce.code.challenge.method: S256  # RHBK 26: PKCE enforcement
        defaultClientScopes:
          - profile
          - email
          - roles
        optionalClientScopes:
          - address
          - phone
          - offline_access

apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  namespace: apicurio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      containers:
        - name: postgres
          image: registry.redhat.io/rhel9/postgresql-15:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-db
                  key: POSTGRES_USER
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-db
                  key: POSTGRES_PASSWORD
            - name: POSTGRESQL_DATABASE
              value: apicuriodb
          volumeMounts:
            - mountPath: /var/lib/pgsql/data
              name: data
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U apicurio
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}

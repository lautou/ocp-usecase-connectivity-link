apiVersion: batch/v1
kind: Job
metadata:
  name: apicurio-hostname-setup
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: Force=true
spec:
  template:
    spec:
      serviceAccountName: openshift-gitops-argocd-application-controller
      restartPolicy: Never
      containers:
        - name: patch-apicurio-hostnames
          image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e

              echo "Step 1/2: Extract cluster apps domain"
              BASE_DOMAIN=$(oc get dns cluster -o jsonpath='{.spec.baseDomain}')
              APPS_DOMAIN="apps.${BASE_DOMAIN}"
              echo "Apps domain: ${APPS_DOMAIN}"

              echo "Step 2/2: Patch ApicurioRegistry3 hostnames"
              oc patch apicurioregistry3 apicurio-studio -n apicurio --type=json -p='[
                {"op": "replace", "path": "/spec/app/auth/authServerUrl", "value": "https://keycloak-keycloak.'${APPS_DOMAIN}'/realms/apicurio"},
                {"op": "replace", "path": "/spec/app/auth/redirectUri", "value": "https://apicurio-studio-ui-apicurio.'${APPS_DOMAIN}'"},
                {"op": "replace", "path": "/spec/app/auth/logoutUrl", "value": "https://apicurio-studio-ui-apicurio.'${APPS_DOMAIN}'"},
                {"op": "replace", "path": "/spec/app/ingress/host", "value": "apicurio-studio-api-apicurio.'${APPS_DOMAIN}'"},
                {"op": "replace", "path": "/spec/ui/ingress/host", "value": "apicurio-studio-ui-apicurio.'${APPS_DOMAIN}'"}
              ]'

              echo "✅ Apicurio hostnames patched successfully"

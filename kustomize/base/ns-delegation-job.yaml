apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/sync-options: Force=true
  name: globex-ns-delegation
  namespace: openshift-gitops
spec:
  template:
    metadata:
      name: globex-ns-delegation
    spec:
      containers:
        - command:
            - /bin/bash
            - -c
            - |
              #!/bin/bash
              set -e

              echo "========================================"
              echo "Route53 NS Delegation Dynamic Setup"
              echo "========================================"

              # Verify required tools are available
              echo ""
              echo "[0/7] Verifying tools..."
              echo "  - aws: $(aws --version 2>&1 | head -1)"
              echo "  - jq: $(jq --version)"
              echo "  - oc: $(oc version --client --short 2>&1 | head -1)"

              # Wait for HostedZone to be ready
              echo ""
              echo "[1/7] Waiting for HostedZone globex to be ready..."
              RETRY_COUNT=0
              MAX_RETRIES=60
              while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
                if oc get hostedzone globex -n ack-system &>/dev/null; then
                  STATUS=$(oc get hostedzone globex -n ack-system -o jsonpath='{.status.conditions[?(@.type=="ACK.ResourceSynced")].status}' 2>/dev/null || echo "")
                  if [ "$STATUS" = "True" ]; then
                    echo "✓ HostedZone globex is ready"
                    break
                  fi
                fi
                echo "  Waiting for HostedZone globex to sync... (attempt $((RETRY_COUNT+1))/$MAX_RETRIES)"
                sleep 10
                RETRY_COUNT=$((RETRY_COUNT+1))
              done

              if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
                echo "✗ Timeout waiting for HostedZone globex"
                exit 1
              fi

              # Extract nameservers from HostedZone
              echo ""
              echo "[2/7] Extracting nameservers from HostedZone globex..."
              NAMESERVERS=$(oc get hostedzone globex -n ack-system -o jsonpath='{.status.delegationSet.nameServers[*]}')

              if [ -z "$NAMESERVERS" ]; then
                echo "✗ No nameservers found in HostedZone status"
                exit 1
              fi

              echo "✓ Found nameservers:"
              for NS in $NAMESERVERS; do
                echo "  - $NS"
              done

              # Get AWS credentials and cluster info
              echo ""
              echo "[3/7] Extracting AWS credentials and cluster info..."
              AWS_ACCESS_KEY_ID=$(oc extract secret/aws-creds -n kube-system --keys aws_access_key_id --to - 2>/dev/null)
              AWS_SECRET_ACCESS_KEY=$(oc extract secret/aws-creds -n kube-system --keys aws_secret_access_key --to - 2>/dev/null)
              AWS_REGION=$(oc get infrastructure cluster -o jsonpath='{.status.platformStatus.aws.region}')
              BASE_DOMAIN=$(oc get dns cluster -o jsonpath='{.spec.baseDomain}')
              SUBDOMAIN_NAME="globex"
              FULL_DOMAIN="${SUBDOMAIN_NAME}.${BASE_DOMAIN}"

              export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_DEFAULT_REGION="${AWS_REGION}"

              echo "✓ AWS Region: ${AWS_REGION}"
              echo "✓ Base Domain: ${BASE_DOMAIN}"
              echo "✓ Full Subdomain: ${FULL_DOMAIN}"

              # Find public parent zone by walking up the DNS hierarchy
              echo ""
              echo "[4/7] Finding public parent zone in Route53..."
              echo "  (Walking up DNS hierarchy to find public zone)"

              # List all public zones in AWS
              PUBLIC_ZONES=$(aws route53 list-hosted-zones --output json | \
                jq -r '.HostedZones[] | select(.Config.PrivateZone == false) | "\(.Id)|\(.Name)"')

              if [ -z "$PUBLIC_ZONES" ]; then
                echo "✗ No public zones found in AWS account"
                exit 1
              fi

              # Split FULL_DOMAIN into parts and walk up the hierarchy
              DOMAIN_TO_CHECK="${BASE_DOMAIN}"
              PARENT_ZONE_ID=""
              PARENT_ZONE_NAME=""

              while [ -n "$DOMAIN_TO_CHECK" ]; do
                # Check if this domain (with trailing dot) exists as a public zone
                DOMAIN_WITH_DOT="${DOMAIN_TO_CHECK}."
                echo "  Checking if ${DOMAIN_WITH_DOT} has a public zone..."

                FOUND_ZONE=$(echo "$PUBLIC_ZONES" | grep "|${DOMAIN_WITH_DOT}$" | head -1)

                if [ -n "$FOUND_ZONE" ]; then
                  PARENT_ZONE_ID=$(echo "$FOUND_ZONE" | cut -d'|' -f1 | sed 's|/hostedzone/||')
                  PARENT_ZONE_NAME=$(echo "$FOUND_ZONE" | cut -d'|' -f2)
                  echo "✓ Found public zone: ${PARENT_ZONE_NAME} (${PARENT_ZONE_ID})"
                  break
                fi

                # Remove first label and try parent domain
                PARENT_DOMAIN=$(echo "$DOMAIN_TO_CHECK" | sed 's/^[^.]*\.//')

                # Stop if we've reached the same domain (no more dots)
                if [ "$PARENT_DOMAIN" = "$DOMAIN_TO_CHECK" ]; then
                  break
                fi

                DOMAIN_TO_CHECK="$PARENT_DOMAIN"
              done

              if [ -z "$PARENT_ZONE_ID" ]; then
                echo "✗ No public parent zone found for ${FULL_DOMAIN}"
                echo "  Available public zones:"
                echo "$PUBLIC_ZONES" | sed 's/^/    /'
                exit 1
              fi

              echo ""
              echo "✓ Will create NS delegation in: ${PARENT_ZONE_NAME} (${PARENT_ZONE_ID})"
              echo "✓ For subdomain: ${FULL_DOMAIN}"

              # Check if RecordSet already exists
              echo ""
              echo "[5/7] Checking for existing NS delegation RecordSet..."
              if oc get recordset globex-ns-delegation -n ack-system &>/dev/null; then
                echo "⚠ RecordSet globex-ns-delegation already exists, updating..."
                ACTION="updated"
              else
                echo "✓ RecordSet does not exist, will create new one"
                ACTION="created"
              fi

              # Create RecordSet for NS delegation
              echo ""
              echo "[6/7] Creating/Updating RecordSet for NS delegation..."

              # Build resourceRecords array
              RESOURCE_RECORDS=""
              for NS in $NAMESERVERS; do
                RESOURCE_RECORDS="${RESOURCE_RECORDS}
                - value: ${NS}"
              done

              cat <<EOF | oc apply -f -
              apiVersion: route53.services.k8s.aws/v1alpha1
              kind: RecordSet
              metadata:
                name: globex-ns-delegation
                namespace: ack-system
                labels:
                  app.kubernetes.io/name: globex-route53
                  app.kubernetes.io/component: dns-delegation
                  app.kubernetes.io/part-of: connectivity-link
                  app.kubernetes.io/managed-by: argocd
              spec:
                name: ${FULL_DOMAIN}
                recordType: NS
                ttl: 300
                hostedZoneID: ${PARENT_ZONE_ID}
                resourceRecords:${RESOURCE_RECORDS}
              EOF

              echo ""
              echo "[7/7] Verifying DNS delegation setup..."

              # Wait a few seconds for ACK to sync
              sleep 5

              RECORDSET_STATUS=$(oc get recordset globex-ns-delegation -n ack-system -o jsonpath='{.status.status}' 2>/dev/null || echo "UNKNOWN")

              echo "✓ RecordSet sync status: ${RECORDSET_STATUS}"

              echo ""
              echo "========================================"
              echo "✅ NS delegation setup completed!"
              echo "========================================"
              echo ""
              echo "📋 Configuration Summary:"
              echo "  Subdomain: ${FULL_DOMAIN}"
              echo "  Parent Zone: ${PARENT_ZONE_NAME}"
              echo "  Parent Zone ID: ${PARENT_ZONE_ID}"
              echo "  RecordSet Status: ${RECORDSET_STATUS}"
              echo ""
              echo "  Nameservers:"
              for NS in $NAMESERVERS; do
                echo "    - $NS"
              done
              echo ""
              echo "⏱  DNS propagation may take 5-10 minutes."
              echo ""
              echo "✅ Delegation is active in Route53!"
              echo ""

          # Custom image with oc + aws-cli + jq pre-installed
          # Built from Containerfile in this repo
          image: ghcr.io/lautou/ocp-usecase-connectivity-link/ocp-aws-tools:latest
          name: ns-delegation
          imagePullPolicy: Always
      restartPolicy: OnFailure
      serviceAccountName: openshift-gitops-argocd-application-controller

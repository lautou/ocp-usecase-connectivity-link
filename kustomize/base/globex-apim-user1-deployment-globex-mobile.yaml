apiVersion: apps/v1
kind: Deployment
metadata:
  name: globex-mobile
  namespace: globex-apim-user1
  labels:
    app.kubernetes.io/name: globex-mobile
    app.kubernetes.io/instance: globex-user1
    app.kubernetes.io/version: "latest"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: globex-mobile
      app.kubernetes.io/instance: globex-user1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: globex-mobile
        app.kubernetes.io/instance: globex-user1
    spec:
      serviceAccountName: globex-mobile
      initContainers:
        - name: patch-placeholder
          image: quay.io/laurenttourreau/globex-mobile:rhbk26-authcode-flow-v2
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Copying browser files to shared volume..."
              cp -r /opt/app-root/src/dist/globex-mobile/browser/* /app/

              echo "Getting cluster domain from environment..."
              APPS_DOMAIN="${SSO_AUTHORITY#*://}"
              APPS_DOMAIN="${APPS_DOMAIN#keycloak-keycloak.}"
              APPS_DOMAIN="${APPS_DOMAIN%/realms/*}"
              echo "Apps domain: ${APPS_DOMAIN}"

              echo "Patching JavaScript files..."
              find /app -name '*.js' -type f -exec sed -i "s/placeholder/${APPS_DOMAIN}/g" {} +

              echo "✓ Placeholder domains replaced with ${APPS_DOMAIN}"
          env:
            - name: SSO_AUTHORITY
              value: "https://keycloak-keycloak.placeholder/realms/globex-user1"
          volumeMounts:
            - name: app-files
              mountPath: /app
      containers:
        - name: globex-mobile
          image: quay.io/laurenttourreau/globex-mobile:rhbk26-authcode-flow-v2
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: app-files
              mountPath: /opt/app-root/src/dist/globex-mobile/browser
          env:
            - name: NODE_ENV
              value: "prod"
            - name: PORT
              value: "8080"
            - name: API_GET_PAGINATED_PRODUCTS
              value: "http://globex-store-app:8080/services/catalog/product"
            - name: API_GET_PRODUCT_DETAILS_BY_IDS
              value: "http://globex-store-app:8080/services/catalog/product/list/"
            - name: API_CART_SERVICE
              value: "http://globex-store-app:8080/services/cart"
            - name: API_CUSTOMER_SERVICE
              value: "http://globex-store-app:8080/services/customer/id/"
            - name: API_ORDER_SERVICE
              value: "http://globex-store-app:8080/services/order"
            - name: API_CLIENT_ID
              value: "globex-mobile"
            - name: GLOBEX_MOBILE_GATEWAY
              value: "https://globex-mobile.globex.placeholder"
            - name: SSO_AUTHORITY
              value: "https://keycloak-keycloak.placeholder/realms/globex-user1"
            - name: SSO_REDIRECT_LOGOUT_URI
              value: "https://globex-mobile-globex-apim-user1.placeholder/home"
            - name: SSO_LOG_LEVEL
              value: "2"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: app-files
          emptyDir: {}

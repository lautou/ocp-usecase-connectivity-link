apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Cluster-scoped resources
  - cluster-gatewayclass-istio.yaml
  - cluster-clusterrole-gateway-manager.yaml
  - cluster-crb-gateway-manager-openshift-gitops-argocd-application-controller.yaml

  # Namespaces
  - cluster-ns-echo-api.yaml
  - cluster-ns-globex-apim-user1.yaml
  - cluster-ns-ingress-gateway.yaml

  # echo-api namespace resources
  - echo-api-authpolicy-echo-api.yaml
  - echo-api-deployment-echo-api.yaml
  - echo-api-httproute-echo-api.yaml
  - echo-api-ratelimitpolicy-echo-api-rlp.yaml
  - echo-api-service-echo-api.yaml

  # globex-apim-user1 namespace resources (monolith architecture)
  # Database
  - globex-apim-user1-secret-globex-db.yaml
  - globex-apim-user1-deployment-globex-db.yaml
  - globex-apim-user1-service-globex-db.yaml
  - globex-apim-user1-serviceaccount-globex-db.yaml

  # ReferenceGrant (allow ingress-gateway to access globex-apim-user1 services)
  - globex-apim-user1-referencegrant-allow-ingress-gateway.yaml

  # Application components
  - globex-apim-user1-deployment-globex-mobile-gateway.yaml
  - globex-apim-user1-deployment-globex-store-app.yaml
  - globex-apim-user1-deployment-globex-mobile.yaml
  - globex-apim-user1-service-globex-mobile-gateway.yaml
  - globex-apim-user1-service-globex-store-app.yaml
  - globex-apim-user1-service-globex-mobile.yaml
  - globex-apim-user1-serviceaccount-globex-mobile-gateway.yaml
  - globex-apim-user1-serviceaccount-globex-store-app.yaml
  - globex-apim-user1-serviceaccount-globex-mobile.yaml

  # Routes
  - globex-apim-user1-route-globex-mobile-gateway.yaml
  - globex-apim-user1-route-globex-mobile.yaml

  # keycloak namespace resources (Keycloak realm import)
  - keycloak-keycloakrealmimport-globex-user1.yaml

  # ingress-gateway namespace resources
  - ingress-gateway-authpolicy-prod-web-deny-all.yaml
  - ingress-gateway-dnspolicy-prod-web.yaml
  - ingress-gateway-gateway-prod-web.yaml
  - ingress-gateway-ratelimitpolicy-prod-web.yaml
  - ingress-gateway-tlspolicy-prod-web.yaml

  # openshift-gitops namespace resources (Jobs for dynamic configuration)
  - openshift-gitops-job-aws-credentials.yaml
  - openshift-gitops-job-echo-api-httproute.yaml
  - openshift-gitops-job-gateway-prod-web.yaml
  - openshift-gitops-job-globex-env.yaml
  - openshift-gitops-job-globex-ns-delegation.yaml
  - openshift-gitops-job-force-realm-reimport.yaml
  - openshift-gitops-cronjob-patch-monitor.yaml

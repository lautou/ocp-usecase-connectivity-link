# WARNING: This file contains DEMO OAuth client secrets from Red Hat Globex workshop materials.
# These secrets are FOR TESTING/DEMO PURPOSES ONLY and should NEVER be used in production.
# Source: https://github.com/rh-soln-pattern-connectivity-link/globex-helm
#
# Production deployments should use:
# - Sealed Secrets (bitnami-labs/sealed-secrets)
# - External Secrets Operator (external-secrets/external-secrets)
# - Vault integration
# - Or generate secrets dynamically via Jobs
#
apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: globex-user1
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak-realm-import
    app.kubernetes.io/instance: globex-realmimport
    app.kubernetes.io/part-of: connectivity-link
    app: keycloak
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "1"  # Import realm before other resources
spec:
  keycloakCRName: keycloak
  realm:
    id: globex-user1
    realm: globex-user1
    displayName: globex-user1
    enabled: true
    loginWithEmailAllowed: true

    roles:
      realm:
        - name: admin
        - name: confidential
        - name: mobile-user
        - name: web-user
        - name: user
        - name: default-roles-globex
          description: "${role_default-roles}"
          composite: true
          composites:
            realm:
              - offline_access
            client:
              account:
                - view-profile
                - manage-account
      client:
        globex-web-gateway:
          - name: uma_protection
            clientRole: true

    clients:
      - clientId: client-manager
        enabled: true
        clientAuthenticatorType: client-secret
        secret: 9JRzL6le4K47JJkcSs6kjd9j2Mmfh1Jc  # DEMO SECRET - hardcoded from upstream Globex materials
        redirectUris:
          - "/*"
        webOrigins:
          - "/*"
        serviceAccountsEnabled: true
        frontchannelLogout: true
        fullScopeAllowed: true
        protocolMappers:
          - name: Client ID
            protocol: openid-connect
            protocolMapper: oidc-usersessionmodel-note-mapper
            config:
              user.session.note: client_id
              id.token.claim: 'true'
              access.token.claim: 'true'
              claim.name: client_id
              jsonType.label: String
          - name: Client Host
            protocol: openid-connect
            protocolMapper: oidc-usersessionmodel-note-mapper
            config:
              user.session.note: clientHost
              id.token.claim: 'true'
              access.token.claim: 'true'
              claim.name: clientHost
              jsonType.label: String
          - name: Client IP Address
            protocol: openid-connect
            protocolMapper: oidc-usersessionmodel-note-mapper
            config:
              user.session.note: clientAddress
              id.token.claim: 'true'
              access.token.claim: 'true'
              claim.name: clientAddress
              jsonType.label: String

      - clientId: globex-web-gateway
        enabled: true
        publicClient: true  # Public client - REQUIRED for Angular SPAs (Keycloak JS no longer supports confidential clients)
        clientAuthenticatorType: "none"  # CRITICAL: Public clients must NOT use client authentication
        redirectUris:
          - "*"
          - "/*"
          - "http://localhost:4200/*"
          - "https://globex-web-globex.apps.*.opentlc.com/*"
        webOrigins:
          - "*"
          - "+"
        standardFlowEnabled: true  # Authorization Code Flow with PKCE (automatically enabled for public clients)
        implicitFlowEnabled: false  # Implicit Flow disabled (deprecated and insecure)
        directAccessGrantsEnabled: false  # Resource Owner Password Credentials disabled (not needed for SPAs)
        serviceAccountsEnabled: false  # Public clients cannot have service accounts
        fullScopeAllowed: true
        attributes:
          pkce.code.challenge.method: "S256"  # Enforce PKCE with SHA-256
        protocolMappers:
          - name: Client ID
            protocol: openid-connect
            protocolMapper: oidc-usersessionmodel-note-mapper
            config:
              user.session.note: clientId
              userinfo.token.claim: 'true'
              id.token.claim: 'true'
              access.token.claim: 'true'
              claim.name: clientId
              jsonType.label: String
          - name: Client Host
            protocol: openid-connect
            protocolMapper: oidc-usersessionmodel-note-mapper
            config:
              user.session.note: clientHost
              userinfo.token.claim: 'true'
              id.token.claim: 'true'
              access.token.claim: 'true'
              claim.name: clientHost
              jsonType.label: String
          - name: Client IP Address
            protocol: openid-connect
            protocolMapper: oidc-usersessionmodel-note-mapper
            config:
              user.session.note: clientAddress
              userinfo.token.claim: 'true'
              id.token.claim: 'true'
              access.token.claim: 'true'
              claim.name: clientAddress
              jsonType.label: String

      - clientId: globex-mobile
        enabled: true
        publicClient: true
        clientAuthenticatorType: "none"
        redirectUris:
          - "*"
        webOrigins:
          - "*"
          - "+"
        standardFlowEnabled: true
        implicitFlowEnabled: true
        directAccessGrantsEnabled: true
        fullScopeAllowed: true
        attributes:
          pkce.code.challenge.method: "S256"
        protocolMappers:
          - name: Client ID
            protocol: openid-connect
            protocolMapper: oidc-usersessionmodel-note-mapper
            config:
              user.session.note: clientId
              userinfo.token.claim: 'true'
              id.token.claim: 'true'
              access.token.claim: 'true'
              claim.name: clientId
              jsonType.label: String
          - name: Client Host
            protocol: openid-connect
            protocolMapper: oidc-usersessionmodel-note-mapper
            config:
              user.session.note: clientHost
              userinfo.token.claim: 'true'
              id.token.claim: 'true'
              access.token.claim: 'true'
              claim.name: clientHost
              jsonType.label: String
          - name: Client IP Address
            protocol: openid-connect
            protocolMapper: oidc-usersessionmodel-note-mapper
            config:
              user.session.note: clientAddress
              userinfo.token.claim: 'true'
              id.token.claim: 'true'
              access.token.claim: 'true'
              claim.name: clientAddress
              jsonType.label: String

    users:
      - username: service-account-globex-web-gateway
        enabled: true
        email: service-account-backend-service@placeholder.org
        serviceAccountClientId: globex-web-gateway
        realmRoles:
          - offline_access
        clientRoles:
          globex-web-gateway:
            - uma_protection
          account:
            - view-profile
            - manage-account

      - username: service-account-client-manager
        enabled: true
        serviceAccountClientId: client-manager
        realmRoles:
          - default-roles-globex
        clientRoles:
          realm-management:
            - manage-clients

      - username: user1
        email: user1@email.com
        firstName: Admin
        lastName: User
        enabled: true
        credentials:
          - type: password
            userLabel: My password
            secretData: '{"value":"80d4Uk0YFiEgjhzKlTCPpWIj1ZwPJhLbdOmtT6jrbGk=","salt":"I/MiuExkIwpPxqm41IaSEQ==","additionalParameters":{}}'
            credentialData: '{"hashIterations":27500,"algorithm":"pbkdf2-sha256","additionalParameters":{}}'
        realmRoles:

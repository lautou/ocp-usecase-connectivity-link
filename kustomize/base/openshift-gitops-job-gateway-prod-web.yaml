apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/sync-options: Force=true
  name: gateway-prod-web-setup
  namespace: openshift-gitops
spec:
  template:
    metadata:
      name: gateway-prod-web-setup
    spec:
      containers:
        - command:
            - /bin/bash
            - -c
            - |
              #!/bin/bash
              set -e

              echo "========================================"
              echo "Gateway prod-web Dynamic Setup"
              echo "========================================"

              # Get cluster domain
              echo ""
              echo "[1/2] Getting cluster domain..."
              BASE_DOMAIN=$(oc get dns cluster -o jsonpath='{.spec.baseDomain}')
              SUBDOMAIN_NAME="globex"
              GATEWAY_HOSTNAME="*.${SUBDOMAIN_NAME}.${BASE_DOMAIN}"

              echo "✓ Cluster base domain: ${BASE_DOMAIN}"
              echo "✓ Gateway hostname: ${GATEWAY_HOSTNAME}"

              # Create Gateway
              echo ""
              echo "[2/2] Creating Gateway prod-web..."

              cat <<EOF | oc apply -f -
              apiVersion: gateway.networking.k8s.io/v1
              kind: Gateway
              metadata:
                name: prod-web
                namespace: ingress-gateway
                labels:
                  istio.io/rev: openshift-gateway
                  app.kubernetes.io/part-of: connectivity-link
                  argocd.argoproj.io/managed-by: openshift-gitops
              spec:
                gatewayClassName: istio
                listeners:
                  - allowedRoutes:
                      namespaces:
                        from: All
                    hostname: '${GATEWAY_HOSTNAME}'
                    name: api
                    port: 443
                    protocol: HTTPS
                    tls:
                      certificateRefs:
                        - group: ''
                          kind: Secret
                          name: api-tls
                      mode: Terminate
              EOF

              echo ""
              echo "========================================"
              echo "✅ Gateway prod-web created successfully!"
              echo "========================================"
              echo ""
              echo "📋 Summary:"
              echo "  Gateway: prod-web"
              echo "  Namespace: ingress-gateway"
              echo "  Hostname: ${GATEWAY_HOSTNAME}"
              echo "  GatewayClass: istio"
              echo "  Listener: api (HTTPS:443)"
              echo ""

          image: registry.redhat.io/openshift4/ose-cli:latest
          name: gateway-prod-web-setup
      restartPolicy: OnFailure
      serviceAccountName: openshift-gitops-argocd-application-controller

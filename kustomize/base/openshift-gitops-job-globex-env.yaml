apiVersion: batch/v1
kind: Job
metadata:
  name: globex-env-setup
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name: globex-env-setup
    app.kubernetes.io/part-of: connectivity-link
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-options: Force=true
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: globex-env-setup
    spec:
      serviceAccountName: openshift-gitops-argocd-application-controller
      restartPolicy: Never
      containers:
        - name: patch-env
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e

              echo "=========================================="
              echo "Globex Environment Variables Patch"
              echo "=========================================="
              echo ""

              # Get OpenShift apps domain
              echo "[1/5] Getting OpenShift apps domain..."
              APPS_DOMAIN=$(oc get ingresscontroller default -n openshift-ingress-operator -o jsonpath='{.status.domain}')
              echo "✓ Apps domain: ${APPS_DOMAIN}"
              echo ""

              # Construct URLs
              echo "[2/5] Constructing SSO URLs..."
              KEYCLOAK_URL="https://keycloak-keycloak.${APPS_DOMAIN}/realms/globex-user1"
              LOGOUT_URI="https://globex-mobile-globex-apim-user1.${APPS_DOMAIN}/home"
              echo "✓ Keycloak SSO Authority: ${KEYCLOAK_URL}"
              echo "✓ Logout redirect URI: ${LOGOUT_URI}"
              echo ""

              # Check if configuration is already up-to-date (skip unnecessary work)
              echo "[3/5] Checking if configuration is already current..."
              CURRENT_SSO_AUTHORITY=$(oc get deployment globex-mobile -n globex-apim-user1 -o jsonpath='{.spec.template.spec.containers[0].env[?(@.name=="SSO_AUTHORITY")].value}' 2>/dev/null || echo "")
              CURRENT_LOGOUT_URI=$(oc get deployment globex-mobile -n globex-apim-user1 -o jsonpath='{.spec.template.spec.containers[0].env[?(@.name=="SSO_REDIRECT_LOGOUT_URI")].value}' 2>/dev/null || echo "")

              if [ "$CURRENT_SSO_AUTHORITY" = "$KEYCLOAK_URL" ] && [ "$CURRENT_LOGOUT_URI" = "$LOGOUT_URI" ]; then
                echo "✓ Configuration is already up-to-date!"
                echo ""
                echo "=========================================="
                echo "✅ No changes needed - skipping patch"
                echo "=========================================="
                exit 0
              fi
              echo "✓ Configuration needs update, proceeding with patch..."
              echo ""

              # Patch globex-mobile Deployment
              echo "[4/5] Patching globex-mobile Deployment environment variables..."
              oc patch deployment globex-mobile -n globex-apim-user1 --type=json -p="[
                {\"op\": \"replace\", \"path\": \"/spec/template/spec/initContainers/0/env/0/value\", \"value\": \"${KEYCLOAK_URL}\"},
                {\"op\": \"replace\", \"path\": \"/spec/template/spec/containers/0/env/8/value\", \"value\": \"${KEYCLOAK_URL}\"},
                {\"op\": \"replace\", \"path\": \"/spec/template/spec/containers/0/env/9/value\", \"value\": \"${LOGOUT_URI}\"}
              ]"
              echo "✓ globex-mobile patched"
              echo ""

              # Patch globex-mobile-gateway Deployment
              echo "[5/5] Patching globex-mobile-gateway Deployment environment variables..."
              oc patch deployment globex-mobile-gateway -n globex-apim-user1 --type=json -p="[
                {\"op\": \"replace\", \"path\": \"/spec/template/spec/containers/0/env/1/value\", \"value\": \"${KEYCLOAK_URL}\"}
              ]"
              echo "✓ globex-mobile-gateway patched"
              echo ""

              echo "=========================================="
              echo "✅ All environment variables updated!"
              echo "=========================================="
              echo ""
              echo "📋 Summary:"
              echo "  Deployments patched:"
              echo "    - globex-mobile (SSO Authority, Logout URI)"
              echo "    - globex-mobile-gateway (Keycloak Auth Server)"
              echo "  Namespace: globex"
              echo "  Keycloak URL: ${KEYCLOAK_URL}"
              echo "  Logout URI: ${LOGOUT_URI}"

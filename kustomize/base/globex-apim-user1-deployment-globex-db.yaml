apiVersion: apps/v1
kind: Deployment
metadata:
  name: globex-db
  namespace: globex-apim-user1
  labels:
    app.kubernetes.io/name: globex-db
    app.kubernetes.io/instance: globex-user1
    app.kubernetes.io/version: "latest"
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: globex-db
      app.kubernetes.io/instance: globex-user1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: globex-db
        app.kubernetes.io/instance: globex-user1
    spec:
      serviceAccountName: globex-db
      containers:
        - name: globex-db
          image: quay.io/cloud-architecture-workshop/globex-store-db:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: globex-db
                  key: database-user
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: globex-db
                  key: database-password
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: globex-db
                  key: database-name
            - name: POSTGRESQL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: globex-db
                  key: database-admin-password
            - name: POSTGRESQL_DEBEZIUM_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: globex-db
                  key: database-debezium-password
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
          readinessProbe:
            exec:
              command:
                - /usr/libexec/check-container
            initialDelaySeconds: 5
          resources:
            limits:
              cpu: 250m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi

apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/sync-options: Force=true
  name: globex-ns-delegation
  namespace: openshift-gitops
spec:
  template:
    metadata:
      name: globex-ns-delegation
    spec:
      containers:
        - command:
            - /bin/bash
            - -c
            - |
              #!/bin/bash
              set -e

              echo "========================================"
              echo "Route53 DNS Infrastructure Setup"
              echo "========================================"

              # Get cluster domain first
              echo ""
              echo "[1/6] Getting cluster domain..."
              BASE_DOMAIN=$(oc get dns cluster -o jsonpath='{.spec.baseDomain}')

              # Extract cluster name (first segment of BASE_DOMAIN)
              # e.g., myocp.sandbox4993.opentlc.com -> myocp
              CLUSTER_NAME=$(echo "${BASE_DOMAIN}" | cut -d'.' -f1)

              SUBDOMAIN_NAME="globex"
              FULL_DOMAIN="${SUBDOMAIN_NAME}.${BASE_DOMAIN}"

              # RecordSet name must be relative (not FQDN) to avoid domain duplication
              # e.g., globex.myocp (not globex.myocp.sandbox4993.opentlc.com)
              RECORDSET_NAME="${SUBDOMAIN_NAME}.${CLUSTER_NAME}"

              echo "✓ Cluster base domain: ${BASE_DOMAIN}"
              echo "✓ Cluster name: ${CLUSTER_NAME}"
              echo "✓ Full subdomain: ${FULL_DOMAIN}"
              echo "✓ RecordSet name (relative): ${RECORDSET_NAME}"

              # Create HostedZone
              echo ""
              echo "[2/6] Creating HostedZone for ${FULL_DOMAIN}..."
              cat <<EOF | oc apply -f -
              apiVersion: route53.services.k8s.aws/v1alpha1
              kind: HostedZone
              metadata:
                name: globex
                namespace: ack-system
                annotations:
                  argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
                labels:
                  app.kubernetes.io/part-of: connectivity-link
                  argocd.argoproj.io/managed-by: openshift-gitops
              spec:
                name: ${FULL_DOMAIN}
                hostedZoneConfig:
                  comment: "Globex subdomain for Red Hat Connectivity Link"
                tags:
                  - key: managed-by
                    value: ack-route53
                  - key: purpose
                    value: connectivity-link
                  - key: environment
                    value: openshift
              EOF
              echo "✓ HostedZone created/updated"

              # Wait for HostedZone to be ready
              echo ""
              echo "[3/6] Waiting for HostedZone globex to be ready..."
              RETRY_COUNT=0
              MAX_RETRIES=60
              while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
                if oc get hostedzone globex -n ack-system &>/dev/null; then
                  STATUS=$(oc get hostedzone globex -n ack-system -o jsonpath='{.status.conditions[?(@.type=="ACK.ResourceSynced")].status}' 2>/dev/null || echo "")
                  if [ "$STATUS" = "True" ]; then
                    echo "✓ HostedZone globex is ready"
                    break
                  fi
                fi
                echo "  Waiting for HostedZone globex to sync... (attempt $((RETRY_COUNT+1))/$MAX_RETRIES)"
                sleep 10
                RETRY_COUNT=$((RETRY_COUNT+1))
              done

              if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
                echo "✗ Timeout waiting for HostedZone globex"
                exit 1
              fi

              # Extract nameservers from HostedZone
              echo ""
              echo "[4/6] Extracting nameservers from HostedZone globex..."
              NAMESERVERS=$(oc get hostedzone globex -n ack-system -o jsonpath='{.status.delegationSet.nameServers[*]}')

              if [ -z "$NAMESERVERS" ]; then
                echo "✗ No nameservers found in HostedZone status"
                exit 1
              fi

              echo "✓ Found nameservers:"
              for NS in $NAMESERVERS; do
                echo "  - $NS"
              done

              # Get parent zone info
              echo ""
              echo "[5/6] Getting parent zone information..."
              PARENT_ZONE_ID=$(oc get dns cluster -o jsonpath='{.spec.publicZone.id}')

              # Extract root domain from baseDomain (remove cluster name prefix)
              # e.g., myocp.sandbox4993.opentlc.com -> sandbox4993.opentlc.com
              ROOT_DOMAIN=$(echo "${BASE_DOMAIN}" | sed 's/^[^.]*\.//')

              echo "✓ Root domain: ${ROOT_DOMAIN}"
              echo "✓ Parent zone ID (from cluster): ${PARENT_ZONE_ID}"

              # Create RecordSet for NS delegation
              echo ""
              echo "[6/6] Creating NS delegation RecordSet..."

              # Check if RecordSet already exists for logging
              if oc get recordset globex-ns-delegation -n ack-system &>/dev/null; then
                echo "⚠ RecordSet globex-ns-delegation already exists, updating..."
                ACTION="updated"
              else
                echo "✓ RecordSet does not exist, will create new one"
                ACTION="created"
              fi

              # Build resourceRecords array
              RESOURCE_RECORDS=""
              for NS in $NAMESERVERS; do
                RESOURCE_RECORDS="${RESOURCE_RECORDS}
                - value: ${NS}"
              done

              cat <<EOF | oc apply -f -
              apiVersion: route53.services.k8s.aws/v1alpha1
              kind: RecordSet
              metadata:
                name: globex-ns-delegation
                namespace: ack-system
                labels:
                  app.kubernetes.io/part-of: connectivity-link
                  argocd.argoproj.io/managed-by: openshift-gitops
              spec:
                name: ${RECORDSET_NAME}
                recordType: NS
                ttl: 300
                hostedZoneID: ${PARENT_ZONE_ID}
                resourceRecords:${RESOURCE_RECORDS}
              EOF

              echo ""
              echo "========================================"
              echo "✅ NS delegation RecordSet ${ACTION} successfully!"
              echo "========================================"
              echo ""
              echo "📋 Summary:"
              echo "  Subdomain: ${FULL_DOMAIN}"
              echo "  Parent Zone: ${ROOT_DOMAIN}"
              echo "  Parent Zone ID: ${PARENT_ZONE_ID}"
              echo ""
              echo "  Nameservers:"
              for NS in $NAMESERVERS; do
                echo "    - $NS"
              done
              echo ""
              echo "DNS delegation is now active. Please allow 5-10 minutes for DNS propagation."
              echo ""

          image: registry.redhat.io/openshift4/ose-cli:latest
          name: ns-delegation
      restartPolicy: OnFailure
      serviceAccountName: openshift-gitops-argocd-application-controller

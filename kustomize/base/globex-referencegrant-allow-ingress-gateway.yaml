apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-ingress-gateway
  namespace: globex
  labels:
    app.kubernetes.io/part-of: connectivity-link
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: ingress-gateway
  to:
    - group: ""
      kind: Service

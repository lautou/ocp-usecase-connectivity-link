apiVersion: apps/v1
kind: Deployment
metadata:
  name: activity-tracking
  namespace: globex
  labels:
    app.kubernetes.io/name: activity-tracking
    app.kubernetes.io/instance: globex-user1
    app.kubernetes.io/version: "latest"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: activity-tracking
      app.kubernetes.io/instance: globex-user1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: activity-tracking
        app.kubernetes.io/instance: globex-user1
    spec:
      serviceAccountName: activity-tracking
      containers:
        - name: activity-tracking
          image: quay.io/cloud-architecture-workshop/activity-tracking-service:latest
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              cpu: 250m
              memory: 250Mi
            requests:
              cpu: 100m
              memory: 128Mi

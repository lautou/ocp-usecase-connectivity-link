apiVersion: apps/v1
kind: Deployment
metadata:
  name: globex-mobile-gateway
  namespace: globex-apim-user1
  labels:
    app.kubernetes.io/name: globex-mobile-gateway
    app.kubernetes.io/instance: globex-user1
    app.kubernetes.io/version: "latest"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: globex-mobile-gateway
      app.kubernetes.io/instance: globex-user1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: globex-mobile-gateway
        app.kubernetes.io/instance: globex-user1
    spec:
      serviceAccountName: globex-mobile-gateway
      containers:
        - name: globex-mobile-gateway
          image: quay.io/cloud-architecture-workshop/globex-mobile-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: GLOBEX_STORE_API_URL
              value: "http://globex-store-app:8080"
            - name: KEYCLOAK_AUTH_SERVER_URL
              value: "https://keycloak-keycloak.placeholder/realms/globex-user1"
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              cpu: 250m
              memory: 250Mi
            requests:
              cpu: 100m
              memory: 128Mi

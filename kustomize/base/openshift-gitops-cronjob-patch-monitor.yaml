apiVersion: batch/v1
kind: CronJob
metadata:
  name: patch-monitor
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name: patch-monitor
    app.kubernetes.io/part-of: connectivity-link
spec:
  # Run every 10 minutes
  schedule: "*/10 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: patch-monitor
        spec:
          serviceAccountName: openshift-gitops-argocd-application-controller
          restartPolicy: Never
          containers:
            - name: monitor
              image: registry.redhat.io/openshift4/ose-cli:latest
              command:
                - /bin/bash
                - -c
                - |
                  set -e

                  echo "=========================================="
                  echo "Patch Monitor - Checking for placeholders"
                  echo "=========================================="
                  echo ""

                  NEEDS_PATCH=0
                  BASE_DOMAIN=$(oc get dns cluster -o jsonpath='{.spec.baseDomain}')
                  ROOT_DOMAIN=$(echo "${BASE_DOMAIN}" | sed 's/^[^.]*\.//')

                  # Check Gateway hostname
                  echo "[1/4] Checking Gateway prod-web hostname..."
                  GATEWAY_HOSTNAME=$(oc get gateway prod-web -n ingress-gateway -o jsonpath='{.spec.listeners[0].hostname}' 2>/dev/null || echo "")
                  if [[ "$GATEWAY_HOSTNAME" == *"placeholder"* ]]; then
                    echo "  ⚠️  Gateway has placeholder: $GATEWAY_HOSTNAME"
                    echo "  → Patching to: *.globex.${ROOT_DOMAIN}"
                    oc patch gateway prod-web -n ingress-gateway --type=json -p="[
                      {\"op\": \"replace\", \"path\": \"/spec/listeners/0/hostname\", \"value\": \"*.globex.${ROOT_DOMAIN}\"}
                    ]"
                    echo "  ✅ Gateway patched"
                    NEEDS_PATCH=1
                  else
                    echo "  ✓ Gateway OK: $GATEWAY_HOSTNAME"
                  fi
                  echo ""

                  # Check echo-api HTTPRoute hostname
                  echo "[2/4] Checking echo-api HTTPRoute hostname..."
                  ECHO_HOSTNAME=$(oc get httproute echo-api -n echo-api -o jsonpath='{.spec.hostnames[0]}' 2>/dev/null || echo "")
                  if [[ "$ECHO_HOSTNAME" == *"placeholder"* ]]; then
                    echo "  ⚠️  HTTPRoute has placeholder: $ECHO_HOSTNAME"
                    echo "  → Patching to: echo.globex.${ROOT_DOMAIN}"
                    oc patch httproute echo-api -n echo-api --type=json -p="[
                      {\"op\": \"replace\", \"path\": \"/spec/hostnames/0\", \"value\": \"echo.globex.${ROOT_DOMAIN}\"}
                    ]"
                    echo "  ✅ HTTPRoute patched"
                    NEEDS_PATCH=1
                  else
                    echo "  ✓ HTTPRoute OK: $ECHO_HOSTNAME"
                  fi
                  echo ""

                  # Check globex-mobile-gateway AuthPolicy
                  echo "[3/4] Checking globex-mobile-gateway AuthPolicy issuerUrl..."
                  ISSUER_URL=$(oc get authpolicy globex-mobile-gateway -n globex-apim-user1 -o jsonpath='{.spec.rules.authentication.keycloak-users.jwt.issuerUrl}' 2>/dev/null || echo "")
                  if [[ "$ISSUER_URL" == *"placeholder"* ]]; then
                    echo "  ⚠️  AuthPolicy has placeholder: $ISSUER_URL"
                    APPS_DOMAIN=$(oc get ingresscontroller default -n openshift-ingress-operator -o jsonpath='{.status.domain}')
                    ISSUER_URL_FIXED="https://keycloak-keycloak.${APPS_DOMAIN}/realms/globex-user1"
                    echo "  → Patching to: ${ISSUER_URL_FIXED}"
                    oc patch authpolicy globex-mobile-gateway -n globex-apim-user1 --type=json -p="[
                      {\"op\": \"replace\", \"path\": \"/spec/rules/authentication/keycloak-users/jwt/issuerUrl\", \"value\": \"${ISSUER_URL_FIXED}\"}
                    ]"
                    echo "  ✅ AuthPolicy patched"
                    NEEDS_PATCH=1
                  else
                    echo "  ✓ AuthPolicy OK: $ISSUER_URL"
                  fi
                  echo ""

                  # Check Keycloak hostname (RHBK)
                  echo "[4/5] Checking Keycloak hostname in rhbk namespace..."
                  KEYCLOAK_HOSTNAME=$(oc get keycloak keycloak -n rhbk -o jsonpath='{.spec.hostname.hostname}' 2>/dev/null || echo "")
                  if [[ "$KEYCLOAK_HOSTNAME" == *"placeholder"* ]]; then
                    echo "  ⚠️  Keycloak has placeholder: $KEYCLOAK_HOSTNAME"
                    APPS_DOMAIN=$(oc get ingresscontroller default -n openshift-ingress-operator -o jsonpath='{.status.domain}')
                    KEYCLOAK_HOSTNAME_FIXED="keycloak-rhbk.${APPS_DOMAIN}"
                    echo "  → Patching to: ${KEYCLOAK_HOSTNAME_FIXED}"
                    oc patch keycloak keycloak -n rhbk --type=json -p="[
                      {\"op\": \"replace\", \"path\": \"/spec/hostname/hostname\", \"value\": \"${KEYCLOAK_HOSTNAME_FIXED}\"}
                    ]"
                    echo "  ✅ Keycloak hostname patched"
                    NEEDS_PATCH=1
                  elif [[ -z "$KEYCLOAK_HOSTNAME" ]]; then
                    echo "  ℹ️  Keycloak not found in rhbk namespace (may not be deployed yet)"
                  else
                    echo "  ✓ Keycloak OK: $KEYCLOAK_HOSTNAME"
                  fi
                  echo ""

                  # Check globex-mobile deployment
                  echo "[5/5] Checking globex-mobile deployment env vars..."
                  SSO_AUTHORITY=$(oc get deployment globex-mobile -n globex-apim-user1 -o jsonpath='{.spec.template.spec.containers[0].env[?(@.name=="SSO_AUTHORITY")].value}' 2>/dev/null || echo "")
                  if [[ "$SSO_AUTHORITY" == *"placeholder"* ]]; then
                    echo "  ⚠️  Deployment has placeholder values"
                    echo "  → Running globex-env patching..."

                    APPS_DOMAIN=$(oc get ingresscontroller default -n openshift-ingress-operator -o jsonpath='{.status.domain}')
                    KEYCLOAK_URL="https://keycloak-keycloak.${APPS_DOMAIN}/realms/globex-user1"
                    LOGOUT_URI="https://globex-mobile-globex-apim-user1.${APPS_DOMAIN}/home"

                    oc patch deployment globex-mobile -n globex-apim-user1 --type=json -p="[
                      {\"op\": \"replace\", \"path\": \"/spec/template/spec/initContainers/0/env/0/value\", \"value\": \"${KEYCLOAK_URL}\"},
                      {\"op\": \"replace\", \"path\": \"/spec/template/spec/containers/0/env/9/value\", \"value\": \"${KEYCLOAK_URL}\"},
                      {\"op\": \"replace\", \"path\": \"/spec/template/spec/containers/0/env/10/value\", \"value\": \"${LOGOUT_URI}\"}
                    ]"

                    oc patch deployment globex-mobile-gateway -n globex-apim-user1 --type=json -p="[
                      {\"op\": \"replace\", \"path\": \"/spec/template/spec/containers/0/env/1/value\", \"value\": \"${KEYCLOAK_URL}\"}
                    ]"

                    echo "  ✅ Deployments patched"
                    NEEDS_PATCH=1
                  else
                    echo "  ✓ Deployments OK"
                  fi
                  echo ""

                  echo "=========================================="
                  if [ $NEEDS_PATCH -eq 1 ]; then
                    echo "✅ Patching completed successfully!"
                  else
                    echo "✅ All resources OK - no patching needed"
                  fi
                  echo "=========================================="

apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-engine
  namespace: globex
  labels:
    app.kubernetes.io/name: recommendation-engine
    app.kubernetes.io/instance: globex-user1
    app.kubernetes.io/version: "latest"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: recommendation-engine
      app.kubernetes.io/instance: globex-user1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: recommendation-engine
        app.kubernetes.io/instance: globex-user1
    spec:
      serviceAccountName: recommendation-engine
      containers:
        - name: recommendation-engine
          image: quay.io/cloud-architecture-workshop/recommendation-engine:latest
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              cpu: 250m
              memory: 250Mi
            requests:
              cpu: 100m
              memory: 128Mi

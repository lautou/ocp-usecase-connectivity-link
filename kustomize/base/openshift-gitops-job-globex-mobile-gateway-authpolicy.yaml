apiVersion: batch/v1
kind: Job
metadata:
  name: globex-mobile-gateway-authpolicy-setup
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name: globex-mobile-gateway-authpolicy-setup
    app.kubernetes.io/part-of: connectivity-link
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: Force=true
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: globex-mobile-gateway-authpolicy-setup
    spec:
      serviceAccountName: openshift-gitops-argocd-application-controller
      restartPolicy: Never
      containers:
        - name: patch-authpolicy
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e

              echo "=========================================="
              echo "Globex Mobile Gateway AuthPolicy Setup"
              echo "=========================================="
              echo ""

              # Get OpenShift apps domain
              echo "[1/2] Getting OpenShift apps domain..."
              APPS_DOMAIN=$(oc get ingresscontroller default -n openshift-ingress-operator -o jsonpath='{.status.domain}')
              echo "✓ Apps domain: ${APPS_DOMAIN}"
              echo ""

              # Patch AuthPolicy issuerUrl
              echo "[2/2] Patching AuthPolicy issuerUrl..."
              ISSUER_URL="https://keycloak-keycloak.${APPS_DOMAIN}/realms/globex-user1"
              oc patch authpolicy globex-mobile-gateway -n globex-apim-user1 --type=json -p="[
                {\"op\": \"replace\", \"path\": \"/spec/rules/authentication/keycloak-users/jwt/issuerUrl\", \"value\": \"${ISSUER_URL}\"}
              ]"
              echo "✓ AuthPolicy issuerUrl set to: ${ISSUER_URL}"
              echo ""

              echo "=========================================="
              echo "✅ Globex Mobile Gateway AuthPolicy configured!"
              echo "=========================================="

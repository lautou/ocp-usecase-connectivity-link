apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/sync-options: Force=true
  name: aws-credentials-setup
  namespace: openshift-gitops
spec:
  template:
    metadata:
      name: aws-credentials-setup
    spec:
      containers:
        - command:
            - /bin/bash
            - -c
            - |
              #!/bin/bash
              set -e

              echo "========================================"
              echo "AWS Credentials Setup"
              echo "========================================"

              # Extract AWS credentials from kube-system/aws-creds
              echo ""
              echo "[1/4] Extracting AWS credentials from cluster..."

              AWS_ACCESS_KEY_ID=$(oc get secret aws-creds -n kube-system -o jsonpath='{.data.aws_access_key_id}' | base64 -d)
              AWS_SECRET_ACCESS_KEY=$(oc get secret aws-creds -n kube-system -o jsonpath='{.data.aws_secret_access_key}' | base64 -d)
              AWS_REGION=$(oc get infrastructure cluster -o jsonpath='{.status.platformStatus.aws.region}')

              echo "✓ AWS credentials extracted"

              # Create Secret for DNSPolicy (Kuadrant)
              echo ""
              echo "[2/4] Creating aws-credentials Secret for DNSPolicy..."

              cat <<EOF | oc apply -f -
              apiVersion: v1
              kind: Secret
              metadata:
                name: aws-credentials
                namespace: ingress-gateway
              type: kuadrant.io/aws
              stringData:
                AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
                AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
                AWS_REGION: "${AWS_REGION}"
              EOF

              echo "✓ DNSPolicy secret created"

              # Create Secret for cert-manager
              echo ""
              echo "[3/4] Creating aws-acme Secret for cert-manager..."

              cat <<EOF | oc apply -f -
              apiVersion: v1
              kind: Secret
              metadata:
                name: aws-acme
                namespace: ingress-gateway
              stringData:
                awsAccessKey: "${AWS_ACCESS_KEY_ID}"
                awsSecretAccessKey: "${AWS_SECRET_ACCESS_KEY}"
              EOF

              echo "✓ cert-manager secret created"

              # Verify Secrets
              echo ""
              echo "[4/4] Verifying Secrets..."

              oc get secret aws-credentials -n ingress-gateway &>/dev/null && echo "✓ aws-credentials verified"
              oc get secret aws-acme -n ingress-gateway &>/dev/null && echo "✓ aws-acme verified"

              echo ""
              echo "========================================"
              echo "✅ AWS credentials configured successfully!"
              echo "========================================"
              echo ""
              echo "📋 Summary:"
              echo "  Secrets created:"
              echo "    - aws-credentials (DNSPolicy)"
              echo "    - aws-acme (cert-manager)"
              echo "  Namespace: ingress-gateway"
              echo ""

          image: registry.redhat.io/openshift4/ose-cli:latest
          name: aws-credentials-setup
      restartPolicy: OnFailure
      serviceAccountName: openshift-gitops-argocd-application-controller

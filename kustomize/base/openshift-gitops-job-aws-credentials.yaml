apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/sync-options: Force=true
  name: aws-credentials-setup
  namespace: openshift-gitops
spec:
  template:
    metadata:
      name: aws-credentials-setup
    spec:
      containers:
        - command:
            - /bin/bash
            - -c
            - |
              #!/bin/bash
              set -e

              echo "========================================"
              echo "AWS Credentials Setup for DNSPolicy"
              echo "========================================"

              # Extract AWS credentials from kube-system/aws-creds
              echo ""
              echo "[1/3] Extracting AWS credentials from cluster..."

              AWS_ACCESS_KEY_ID=$(oc get secret aws-creds -n kube-system -o jsonpath='{.data.aws_access_key_id}' | base64 -d)
              AWS_SECRET_ACCESS_KEY=$(oc get secret aws-creds -n kube-system -o jsonpath='{.data.aws_secret_access_key}' | base64 -d)
              AWS_REGION=$(oc get dns cluster -o jsonpath='{.spec.publicZone.tags.kubernetes\.io/cluster/.*}' 2>/dev/null || echo "eu-central-1")

              echo "✓ AWS credentials extracted"

              # Create Secret in ingress-gateway namespace
              echo ""
              echo "[2/3] Creating aws-credentials Secret..."

              cat <<EOF | oc apply -f -
              apiVersion: v1
              kind: Secret
              metadata:
                name: aws-credentials
                namespace: ingress-gateway
              type: Opaque
              stringData:
                AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
                AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
                AWS_REGION: "${AWS_REGION}"
              EOF

              echo "✓ Secret created"

              # Verify DNSPolicy can use the credentials
              echo ""
              echo "[3/3] Verifying Secret..."

              oc get secret aws-credentials -n ingress-gateway &>/dev/null && echo "✓ Secret verified"

              echo ""
              echo "========================================"
              echo "✅ AWS credentials configured successfully!"
              echo "========================================"
              echo ""
              echo "📋 Summary:"
              echo "  Secret: aws-credentials"
              echo "  Namespace: ingress-gateway"
              echo "  Ready for DNSPolicy to use"
              echo ""

          image: registry.redhat.io/openshift4/ose-cli:latest
          name: aws-credentials-setup
      restartPolicy: OnFailure
      serviceAccountName: openshift-gitops-argocd-application-controller

apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: Force=true
  name: echo-api-httproute-setup
  namespace: openshift-gitops
spec:
  template:
    metadata:
      name: echo-api-httproute-setup
    spec:
      containers:
        - command:
            - /bin/bash
            - -c
            - |
              #!/bin/bash
              set -e

              echo "========================================"
              echo "Echo API HTTPRoute Hostname Patch"
              echo "========================================"

              # Get cluster domain
              echo ""
              echo "[1/2] Getting cluster domain..."
              BASE_DOMAIN=$(oc get dns cluster -o jsonpath='{.spec.baseDomain}')
              HTTPROUTE_HOSTNAME="echo.globex.${BASE_DOMAIN}"

              echo "✓ Cluster base domain: ${BASE_DOMAIN}"
              echo "✓ Target hostname: ${HTTPROUTE_HOSTNAME}"

              # Patch HTTPRoute hostname
              echo ""
              echo "[2/2] Patching HTTPRoute hostname..."

              oc patch httproute echo-api -n echo-api --type=json -p="[
                {\"op\": \"replace\", \"path\": \"/spec/hostnames/0\", \"value\": \"${HTTPROUTE_HOSTNAME}\"}
              ]"

              echo ""
              echo "========================================"
              echo "✅ HTTPRoute hostname updated successfully!"
              echo "========================================"
              echo ""
              echo "📋 Summary:"
              echo "  HTTPRoute: echo-api"
              echo "  Namespace: echo-api"
              echo "  Hostname: ${HTTPROUTE_HOSTNAME}"
              echo ""

          image: registry.redhat.io/openshift4/ose-cli:latest
          name: echo-api-httproute-setup
      restartPolicy: OnFailure
      serviceAccountName: openshift-gitops-argocd-application-controller

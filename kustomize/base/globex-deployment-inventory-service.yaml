apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory
  namespace: globex
  labels:
    app.kubernetes.io/name: inventory
    app.kubernetes.io/instance: globex-user1
    app.kubernetes.io/version: "latest"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: inventory
      app.kubernetes.io/instance: globex-user1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inventory
        app.kubernetes.io/instance: globex-user1
    spec:
      serviceAccountName: inventory
      containers:
        - name: inventory-service
          image: quay.io/cloud-architecture-workshop/inventory-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: QUARKUS_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: inventory-db
                  key: database-user
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventory-db
                  key: database-password
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: inventory-db
                  key: database-name
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: jdbc:postgresql://inventory-db:5432/${POSTGRESQL_DATABASE}
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              cpu: 200m
              memory: 250Mi
            requests:
              cpu: 100m
              memory: 128Mi

apiVersion: apps/v1
kind: Deployment
metadata:
  name: globex-web
  namespace: globex
  labels:
    app.kubernetes.io/name: globex-web
    app.kubernetes.io/instance: globex-user1
    app.kubernetes.io/version: "latest"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: globex-web
      app.kubernetes.io/instance: globex-user1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: globex-web
        app.kubernetes.io/instance: globex-user1
    spec:
      serviceAccountName: globex-web
      containers:
        - name: globex-web
          image: quay.io/cloud-architecture-workshop/globex-web:latest
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: "prod"
            - name: PORT
              value: "8080"
            - name: API_TRACK_USEREVENTS
              value: "http://activity-tracking:8080/track"
            - name: API_GET_PAGINATED_PRODUCTS
              value: "http://globex-store-app:8080/services/products"
            - name: API_GET_PRODUCT_DETAILS_BY_IDS
              value: "http://globex-store-app:8080/services/products/list/"
            - name: API_CATALOG_RECOMMENDED_PRODUCT_IDS
              value: "http://recommendation-engine:8080/score/product"
            - name: API_TRACK_CART
              value: "http://globex-store-app:8080/services/cart"
            - name: API_GET_CUSTOMER_BY_USERNAME
              value: "http://globex-store-app:8080/services/customer/"
            - name: API_TRACK_PLACE_ORDER
              value: "http://globex-store-app:8080/services/order"
            - name: SSO_CUSTOM_CONFIG
              value: "true"
            - name: SSO_AUTHORITY
              value: "https://keycloak-keycloak.placeholder/realms/globex-user1"
            - name: SSO_CLIENT_ID
              value: "globex-web-gateway"
            - name: SSO_REDIRECT_LOGOUT_URI
              value: "https://globex-web-globex.placeholder/home"
            - name: SSO_LOG_LEVEL
              value: "2"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhbk
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name: rhbk
    app.kubernetes.io/part-of: connectivity-link
spec:
  project: solution-patterns-connectivity-link
  source:
    repoURL: https://github.com/lautou/ocp-usecase-connectivity-link.git
    targetRevision: main
    path: kustomize/rhbk
  destination:
    server: https://kubernetes.default.svc
  ignoreDifferences:
    - group: k8s.keycloak.org
      kind: Keycloak
      jsonPointers:
        - /spec/hostname/hostname
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

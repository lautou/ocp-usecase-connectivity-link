apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhbk
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io/foreground
spec:
  project: solution-patterns-connectivity-link
  source:
    repoURL: https://github.com/lautou/rhcl.git
    targetRevision: main
    path: kustomize/rhbk
  destination:
    server: https://kubernetes.default.svc
    namespace: rhbk
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

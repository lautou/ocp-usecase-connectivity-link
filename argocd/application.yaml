apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: usecase-connectivity-link
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name: usecase-connectivity-link
    app.kubernetes.io/part-of: connectivity-link
spec:
  project: default
  source:
    repoURL: https://github.com/lautou/ocp-usecase-connectivity-link.git
    targetRevision: main
    path: kustomize/overlays/default
  destination:
    server: https://kubernetes.default.svc
    namespace: ack-system
  ignoreDifferences:
    - group: gateway.networking.k8s.io
      kind: Gateway
      jsonPointers:
        - /spec/listeners/0/hostname
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jsonPointers:
        - /spec/hostnames
    - group: apps
      kind: Deployment
      name: globex-web
      namespace: globex
      jsonPointers:
        - /spec/template/spec/containers/0/env/10/value
        - /spec/template/spec/containers/0/env/12/value
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

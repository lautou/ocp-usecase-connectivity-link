apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-deployment
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name: bootstrap-deployment
    app.kubernetes.io/part-of: connectivity-link
spec:
  project: solution-patterns-connectivity-link
  source:
    repoURL: https://github.com/lautou/ocp-usecase-connectivity-link.git
    targetRevision: main
    path: kustomize/overlays/default
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-gateway
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name: ingress-gateway
    app.kubernetes.io/part-of: connectivity-link
spec:
  project: solution-patterns-connectivity-link
  source:
    repoURL: https://github.com/lautou/ocp-usecase-connectivity-link.git
    targetRevision: main
    path: kustomize/ingress-gateway
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
